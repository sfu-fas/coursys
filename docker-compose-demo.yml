services:

  mysql:
    image: 'mariadb:11.8'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql:/var/lib/mysql:rw
    environment:
      - MYSQL_USER=coursysuser
      - MYSQL_PASSWORD=coursyspassword
      - MYSQL_DATABASE=coursys
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    healthcheck: # https://mariadb.com/docs/server/server-management/automated-mariadb-deployment-and-administration/docker-and-mariadb/using-healthcheck-sh
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      interval: 10s
      start_period: 5s
    networks:
      - internal

  smtp4dev:
    image: 'rnwood/smtp4dev'
    ports:
      - "8025:80"
    healthcheck:
      test: curl --fail http://localhost:80/ || exit 1
      timeout: 5s
      interval: 60s
      start_period: 10s
    networks:
      - internal
      - external

  rabbitmq:
    image: 'rabbitmq:3'
    volumes:
      - rabbitmq:/var/lib/rabbitmq:rw
    environment:
      - RABBITMQ_DEFAULT_USER=coursys
      - RABBITMQ_DEFAULT_PASS=rabbitmq_password
      - RABBITMQ_DEFAULT_VHOST=myvhost
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      timeout: 30s
      interval: 30s
      start_period: 10s
    networks:
      - internal

  elasticsearch:
    image: 'elasticsearch:5.6.16'
    ports:
      - "9200"
      - "9300"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data:rw
    environment:
      - discovery.type=single-node
      - allocation.disk.threshold_enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      timeout: 30s
      interval: 60s
      start_period: 15s
    networks:
      - internal

  memcached:
    image: 'memcached:1-alpine'
    healthcheck:
      test: echo "version" | nc -vn -w 1 127.0.0.1 11211
      timeout: 5s
      interval: 60s
      start_period: 5s
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
    healthcheck:
      test: curl --fail http://localhost:80/static/icons/favicon.ico?healthcheck || exit 1
      timeout: 5s
      interval: 60s
      start_period: 5s
    volumes:
      - static:/static:ro
      - ./nginx-logs:/nginx-logs
    networks:
      - internal
      - external

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      args:
        - DEPLOY_MODE=demo
    init: true  # init sends appropriate TERM signals to gunicorn to restart cleanly
    depends_on:
      - rabbitmq
      - elasticsearch
      - memcached
      - mysql
    volumes:
      - static:/static:rw
    networks:
      - internal
    deploy:
      replicas: 2
  
  celerybeat:
    extends: app
    healthcheck:
      test: echo  # I see no meaningful check, except existing
    deploy:
      replicas: 1
    command: celery -A courses beat --loglevel INFO

  celery:
    extends: app
    healthcheck:
      test: curl --fail http://localhost:9000/ || exit 1
    deploy:
      replicas: 2
    command: celery -A courses worker --loglevel INFO --concurrency 1

volumes:
  static:
  mysql:
  rabbitmq:
  elasticsearch:

networks:
  internal:
  external:
