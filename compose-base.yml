services:
  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq.Dockerfile
    volumes:
      - /data/rabbitmq3:/var/lib/rabbitmq:rw,Z
    environment:
      - RABBITMQ_DEFAULT_USER=rmquser
      - RABBITMQ_DEFAULT_PASS=rmqpass
      - RABBITMQ_DEFAULT_PASS_SECRET=/run/secrets/rabbitmq-default-password # the secret wins if both are present
      - RABBITMQ_DEFAULT_VHOST=vhost
    restart: unless-stopped
    networks:
      - backend
      - web

  elasticsearch:
    image: 'elasticsearch:7.17.28'
    volumes:
      - /data/elasticsearch7:/usr/share/elasticsearch/data:rw,z
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    restart: unless-stopped
    healthcheck:
      test: curl -s http://localhost:9200 >/dev/null || exit 1
      timeout: 30s
      interval: 60s
      start_period: 15s
    networks:
      - backend
      - web

  memcached:
    image: 'memcached:1-alpine'
    restart: unless-stopped
    healthcheck:
      test: echo "version" | nc -vn -w 1 127.0.0.1 11211
      timeout: 5s
      interval: 60s
      start_period: 5s
    networks:
      - backend
      - web

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
    volumes:
      - static:/static:ro
      - /data/nginx_logs:/nginx_logs:rw,Z
      - /data/dynamic_config:/dynamic_config:ro,z
    networks:
      - web

  base:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: base
      args:
        - UID=888
        - DEPLOY_MODE=override_me
    depends_on:
      - rabbitmq
      - elasticsearch
      - memcached
    volumes:
      - static:/static:rw
      - /data/submitted_files:/submitted_files:rw,z
    secrets:
      - app-config
    restart: no
