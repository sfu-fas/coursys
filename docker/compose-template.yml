{% comment %} Yes, YAML built with django templates. This is a totally sane thing to do. {% endcomment %}
services:
  {% if dev_services %}
  mysql:
    image: 'mariadb:11.8'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql:/var/lib/mysql:rw
    environment:
      - MYSQL_USER=dbuser
      - MYSQL_PASSWORD=dbpass
      - MYSQL_DATABASE=dbname
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    restart: unless-stopped
    healthcheck: # https://mariadb.com/docs/server/server-management/automated-mariadb-deployment-and-administration/docker-and-mariadb/using-healthcheck-sh
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      interval: 10s
      start_period: 5s
    networks:
      - backend
      - web

  smtp4dev:
    image: 'rnwood/smtp4dev'
    ports:
      - "8025:80"
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:80/ || exit 1
      timeout: 5s
      interval: 60s
      start_period: 10s
    networks:
      - backend
  {% endif %}

  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq.Dockerfile
    deploy:
      resources:
        limits:
          memory: 2gb
    volumes:
      - {{ data_location }}rabbitmq4:/var/lib/rabbitmq:rw{% if selinux %},Z{% endif %}
    environment:
      - RABBITMQ_DEFAULT_USER=rmquser
      - RABBITMQ_DEFAULT_PASS=rmqpass
      - RABBITMQ_DEFAULT_PASS_SECRET=/run/secrets/rabbitmq-default-password # the secret wins if both are present
      - RABBITMQ_DEFAULT_VHOST=vhost
    restart: unless-stopped
    networks:
      - backend
      - web
    {% if service_password_secrets %}
    secrets:
      - rabbitmq-default-password
    {% endif %}

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch.Dockerfile
    deploy:
      resources:
        limits:
          memory: 4gb
    volumes:
      - {{ data_location }}elasticsearch7:/usr/share/elasticsearch/data:rw{% if selinux %},Z{% endif %}
    environment:
      - ELASTIC_PASSWORD=espass # the secret wins if both are present
      - ELASTIC_PASSWORD_SECRET=/run/secrets/elastic-initial-password
    restart: unless-stopped
    networks:
      - backend
      - web
    {% if service_password_secrets %}
    secrets:
      - elastic-initial-password
    {% endif %}

  memcached:
    image: 'memcached:1-alpine'
    restart: unless-stopped
    healthcheck:
      test: echo "version" | nc -vn -w 1 127.0.0.1 11211
      timeout: 5s
      interval: 60s
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1gb
    networks:
      - backend
      - web
    command: ["--memory-limit=768"]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      # temporary "if" while we make sure these templates match exactly and work
      {% if deploy_mode == 'proddev' %} 
      args:
        - SERVE_HOSTS={{ serve_hosts }}
        - FORWARD_HOSTS={{ redirect_hosts }}
        - CANONICAL_NAME={{ canonical_name }}
      #  - USER_PROTOCOL={{ user_protocol }}
      #  - USER_PORT={{ user_port }}
      {% endif %}
    ports:
      - "{{ external_port }}:80"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1gb
    volumes:
      - static:/static:ro
      - {{ data_location }}nginx_logs:/nginx_logs:rw{% if selinux %},z{% endif %}
      - {{ data_location }}dynamic_config:/dynamic_config:ro{% if selinux %},z{% endif %}
    networks:
      - web

  logrotate:
    build:
      context: .
      dockerfile: docker/logrotate.Dockerfile
    pid: host  # give the container access to signal nginx to re-open log files
    deploy:
      resources:
        limits:
          memory: 10mb
    volumes:
      - status:/status:rw
      - {{ data_location }}nginx_logs:/nginx_logs:rw{% if selinux %},z{% endif %}
      - {{ data_location }}celery_logs:/celery_logs:rw{% if selinux %},z{% endif %}

  base:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: base
      args:
        - UID={{ uid }}
        - DEPLOY_MODE={{ deploy_mode }}
        #- SERVE_HOSTS={{ serve_hosts }}
        #- REDIRECT_HOSTS={{ redirect_hosts }}
        #- USER_PROTOCOL={{ user_protocol }}
        #- USER_PORT={{ user_port }}
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      memcached:
        condition: service_healthy
      {% if dev_services %}mysql:
        condition: service_started{% endif %}
    deploy:
      resources:
        limits:
          memory: 1.5gb
      replicas: 0
    restart: no
    volumes:
      - static:/static:rw
      - {{ data_location }}submitted_files:/submitted_files:rw{% if selinux %},z{% endif %}
      - {{ data_location }}dynamic_config:/dynamic_config:ro{% if selinux %},z{% endif %}
    secrets:
      - app-config

  app:
    extends:
      service: base
    build:
      target: app
    restart: unless-stopped
    deploy:
      replicas: {{ app_replicas }}
    networks:
      - web
    volumes:
      - {{ data_location }}csrpt_auth:/csrpt_auth:rw{% if selinux %},z{% endif %}

  manage:
    extends:
      service: base
    build:
      target: manage
    restart: no
    deploy:
      replicas: 0
    networks:
      - backend
      - web
    volumes:
      - {{ data_location }}csrpt_auth:/csrpt_auth:rw{% if selinux %},z{% endif %}

  admin:
    extends:
      service: base
    build:
      target: admin
    restart: no
    deploy:
      replicas: 0
    networks:
      - backend
      - web
    volumes:
      - {{ data_location }}csrpt_auth:/csrpt_auth:rw{% if selinux %},z{% endif %}
      - {{ data_location }}dynamic_config:/dynamic_config:rw{% if selinux %},z{% endif %}

  celery-fast:
    extends:
      service: base
    build:
      target: celery
    restart: unless-stopped
    deploy:
      replicas: 1
    environment:
      - QUEUE=fast
      - CONCURRENCY=2
    networks:
      - backend
    volumes:
      - {{ data_location }}celery_logs:/celery_logs:rw{% if selinux %},z{% endif %}
  # celery-fast was chosen as the base for the other workers, because it has no custom config, but some others do.
  celery-batch:
    extends: celery-fast
    volumes:
      - {{ data_location }}db_backups:/db_backups:rw{% if selinux %},z{% endif %}
    environment:
      - QUEUE=batch
      - CONCURRENCY=2
  celery-email:
    extends: celery-fast
    environment:
      - QUEUE=email
      - CONCURRENCY=2
  celery-photo:
    extends: celery-fast
    environment:
      - QUEUE=photo
      - CONCURRENCY=5
  celery-sims:
    extends: celery-fast
    volumes:
      - {{ data_location }}csrpt_auth:/csrpt_auth:rw{% if selinux %},z{% endif %}
    environment:
      - QUEUE=sims
      - CONCURRENCY=3

  beat:
    extends:
      service: base
    build:
      target: beat
    deploy:
      replicas: 1
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - status:/status:rw
      - {{ data_location }}celery_logs:/celery_logs:rw{% if selinux %},z{% endif %}


volumes:
  static:
  status:
  {% if dev_services %}mysql:{% endif %}
  {% if everything_in_docker_volumes %}
  rabbitmq4:
  elasticsearch7:
  nginx_logs:
  celery_logs:
  dynamic_config:
  submitted_files:
  db_backups:
  csrpt_auth:
  {% endif %}

networks:
  web:
  backend:


secrets:
  app-config:
    file: ./secrets/app-config.toml
  {% if service_password_secrets %}
  rabbitmq-default-password:
    file: ./secrets/rabbitmq-default-password
  elastic-initial-password:
    file: ./secrets/elastic-initial-password
  {% endif %}
