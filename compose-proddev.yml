services:

  mysql:
    extends:
      file: compose-dev-services.yml
      service: mysql

  smtp4dev:
    extends:
      file: compose-dev-services.yml
      service: smtp4dev

  rabbitmq:
    extends:
      file: compose-base.yml
      service: rabbitmq
    volumes:
      - rabbitmq3:/var/lib/rabbitmq:rw

  elasticsearch:
    extends:
      file: compose-base.yml
      service: elasticsearch
    volumes:
      - elasticsearch7:/usr/share/elasticsearch/data:rw

  memcached:
    extends:
      file: compose-base.yml
      service: memcached

  nginx:
    extends:
      file: compose-base.yml
      service: nginx
    build:
      args:
        - SERVE_HOSTS=localhost
        - FORWARD_HOSTS=
    ports:
      - "8080:80"
    volumes:
      - nginx_logs:/nginx_logs:rw
      - dynamic_config:/dynamic_config:ro

  base:
    extends:
      file: compose-base.yml
      service: base
    build:
      args:
        - DEPLOY_MODE=proddev
    depends_on:
      - mysql
    volumes:
      - submitted_files:/submitted_files:rw
    restart: no
    deploy:
      replicas: 0

  app:
    extends:
      service: base
    build:
      target: app
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      - web

  manage:
    extends:
      service: base
    build:
      target: manage
    restart: no
    deploy:
      replicas: 0
    networks:
      - backend
      - web

  celery-fast:
    extends:
      service: base
    build:
      target: celery
    restart: unless-stopped
    deploy:
      replicas: 1
    environment:
      - QUEUE=fast
      - CONCURRENCY=2
    networks:
      - backend
  celery-batch:
    extends: celery-fast
    volumes:
      - db_backups:/db_backups:rw
    environment:
      - QUEUE=batch
      - CONCURRENCY=2
  celery-email:
    extends: celery-fast
    environment:
      - QUEUE=email
      - CONCURRENCY=2
  celery-photo:
    extends: celery-fast
    environment:
      - QUEUE=photo
      - CONCURRENCY=5
  celery-sims:
    extends: celery-fast
    environment:
      - QUEUE=sims
      - CONCURRENCY=2
    volumes:
      - csrpt_auth:/csrpt_auth:rw,Z

  celerybeat:
    extends:
      service: base
    build:
      target: beat
    deploy:
      replicas: 1
    restart: unless-stopped
    networks:
      - backend


volumes:
  mysql:
  static:
  rabbitmq3:
  elasticsearch7:
  nginx_logs:
  dynamic_config:
  submitted_files:
  db_backups:
  csrpt_auth:


networks:
  web:
  backend:


secrets:
  app-config:
    file: ./secrets/app-config.toml
