# This file is generated from docker/compose-template.yml and "manage.py build_compose_yml".
# Edit the template, not this file. Definitely don't check in any edits.

services:
  
  mysql:
    image: 'mariadb:11.8'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql:/var/lib/mysql:rw
    environment:
      - MYSQL_USER=dbuser
      - MYSQL_PASSWORD=dbpass
      - MYSQL_DATABASE=dbname
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    restart: unless-stopped
    healthcheck: # https://mariadb.com/docs/server/server-management/automated-mariadb-deployment-and-administration/docker-and-mariadb/using-healthcheck-sh
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      interval: 10s
      start_period: 5s
    networks:
      - backend
      - web

  smtp4dev:
    image: 'rnwood/smtp4dev'
    ports:
      - "8025:80"
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:80/ || exit 1
      timeout: 5s
      interval: 60s
      start_period: 10s
    networks:
      - backend
  

  rabbitmq:
    build:
      context: .
      dockerfile: docker/rabbitmq.Dockerfile
    deploy:
      resources:
        limits:
          memory: 2gb
    volumes:
      - rabbitmq4:/var/lib/rabbitmq:rw
    environment:
      - RABBITMQ_DEFAULT_USER=rmquser
      - RABBITMQ_DEFAULT_PASS=rmqpass
      - RABBITMQ_DEFAULT_PASS_SECRET=/run/secrets/rabbitmq-default-password # the secret wins if both are present
      - RABBITMQ_DEFAULT_VHOST=vhost
    restart: unless-stopped
    networks:
      - backend
      - web
    

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch.Dockerfile
    deploy:
      resources:
        limits:
          memory: 4gb
    volumes:
      - elasticsearch7:/usr/share/elasticsearch/data:rw
    environment:
      - ELASTIC_PASSWORD=espass # the secret wins if both are present
      - ELASTIC_PASSWORD_SECRET=/run/secrets/elastic-initial-password
    restart: unless-stopped
    networks:
      - backend
      - web
    

  memcached:
    image: 'memcached:1-alpine'
    restart: unless-stopped
    healthcheck:
      test: echo "version" | nc -vn -w 1 127.0.0.1 11211
      timeout: 5s
      interval: 60s
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1gb
    networks:
      - backend
      - web
    command: ["--memory-limit=768"]

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      # temporary "if" while we make sure these templates match exactly and work
       
      args:
        - SERVE_HOSTS=localhost
        - FORWARD_HOSTS=olddomain
        - CANONICAL_NAME=localhost
      #  - USER_PROTOCOL=http
      #  - USER_PORT=8080
      
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1gb
    volumes:
      - static:/static:ro
      - nginx_logs:/nginx_logs:rw
      - dynamic_config:/dynamic_config:ro
    networks:
      - web

  logrotate:
    build:
      context: .
      dockerfile: docker/logrotate.Dockerfile
    pid: host  # give the container access to signal nginx to re-open log files
    deploy:
      resources:
        limits:
          memory: 10mb
    volumes:
      - status:/status:rw
      - nginx_logs:/nginx_logs:rw
      - celery_logs:/celery_logs:rw

  base:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: base
      args:
        - UID=888
        - DEPLOY_MODE=proddev
        #- SERVE_HOSTS=localhost
        #- REDIRECT_HOSTS=olddomain
        #- USER_PROTOCOL=http
        #- USER_PORT=8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      memcached:
        condition: service_healthy
      mysql:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1.5gb
      replicas: 0
    restart: no
    volumes:
      - static:/static:rw
      - submitted_files:/submitted_files:rw
      - dynamic_config:/dynamic_config:ro
    secrets:
      - app-config

  app:
    extends:
      service: base
    build:
      target: app
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      - web
    volumes:
      - csrpt_auth:/csrpt_auth:rw

  manage:
    extends:
      service: base
    build:
      target: manage
    restart: no
    deploy:
      replicas: 0
    networks:
      - backend
      - web
    volumes:
      - csrpt_auth:/csrpt_auth:rw

  admin:
    extends:
      service: base
    build:
      target: admin
    restart: no
    deploy:
      replicas: 0
    networks:
      - backend
      - web
    volumes:
      - csrpt_auth:/csrpt_auth:rw
      - dynamic_config:/dynamic_config:rw

  celery-fast:
    extends:
      service: base
    build:
      target: celery
    restart: unless-stopped
    deploy:
      replicas: 1
    environment:
      - QUEUE=fast
      - CONCURRENCY=2
    networks:
      - backend
    volumes:
      - celery_logs:/celery_logs:rw
  # celery-fast was chosen as the base for the other workers, because it has no custom config, but some others do.
  celery-batch:
    extends: celery-fast
    volumes:
      - db_backups:/db_backups:rw
    environment:
      - QUEUE=batch
      - CONCURRENCY=2
  celery-email:
    extends: celery-fast
    environment:
      - QUEUE=email
      - CONCURRENCY=2
  celery-photo:
    extends: celery-fast
    environment:
      - QUEUE=photo
      - CONCURRENCY=5
  celery-sims:
    extends: celery-fast
    volumes:
      - csrpt_auth:/csrpt_auth:rw
    environment:
      - QUEUE=sims
      - CONCURRENCY=3

  beat:
    extends:
      service: base
    build:
      target: beat
    deploy:
      replicas: 1
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - status:/status:rw
      - celery_logs:/celery_logs:rw


volumes:
  static:
  status:
  mysql:
  
  rabbitmq4:
  elasticsearch7:
  nginx_logs:
  celery_logs:
  dynamic_config:
  submitted_files:
  db_backups:
  csrpt_auth:
  

networks:
  web:
  backend:


secrets:
  app-config:
    file: ./secrets/app-config.toml
  
